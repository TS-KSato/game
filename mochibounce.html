<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffb3c6">
<meta name="description" content="指で描いたトランポリンで、もちもちのキャラクターを空高くバウンドさせるアクションゲーム。">
<title>MOCHI BOUNCE - もちバウンス</title>
<style>
  :root {
    --primary: #ffb3c6;
    --secondary: #ff8fab;
    --dark: #2b2d42;
    --text: #ffffff;
    --star: #ffd166;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background-color: var(--dark); font-family: "Varela Round", "Nunito", "Hiragino Rounded W8", "Hiragino Maru Gothic ProN", sans-serif; touch-action: none; }
  canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
  
  #ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; }
  
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; transform: scale(1.05); }
  .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }
  
  /* Title Screen */
  #title-screen { background: radial-gradient(circle at center, rgba(255,179,198,0.2) 0%, transparent 70%); }
  h1 { font-size: 42px; color: var(--text); text-shadow: 0 4px 12px rgba(0,0,0,0.3); text-align: center; line-height: 1.1; margin-bottom: 8px; letter-spacing: 2px; }
  h1 span { display: block; font-size: 16px; color: var(--star); letter-spacing: 4px; margin-top: 4px; }
  .subtitle { color: #edf2f4; font-size: 14px; margin-bottom: 40px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); text-align: center; line-height: 1.5; }
  
  .btn { pointer-events: auto; background: linear-gradient(135deg, var(--star), #ffb703); border: none; padding: 16px 40px; border-radius: 99px; color: #854d0e; font-size: 20px; font-weight: 900; box-shadow: 0 8px 0 #d97706, 0 15px 20px rgba(0,0,0,0.3); transition: transform 0.1s, box-shadow 0.1s; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .btn:active { transform: translateY(8px); box-shadow: 0 0px 0 #d97706, 0 5px 10px rgba(0,0,0,0.3); }
  .btn svg { width: 24px; height: 24px; fill: currentColor; }

  /* HUD */
  #hud { position: absolute; top: 0; left: 0; width: 100%; padding: calc(env(safe-area-inset-top) + 16px) 20px 0; display: flex; justify-content: space-between; opacity: 0; transition: opacity 0.3s; }
  #hud.active { opacity: 1; }
  .score-box { background: rgba(43, 45, 66, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 8px 16px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: flex-start; }
  .score-label { font-size: 10px; color: var(--primary); font-weight: bold; letter-spacing: 1px; }
  .score-value { font-size: 24px; color: var(--text); font-weight: 900; }
  .score-box.right { align-items: flex-end; }
  
  /* Game Over Screen */
  #gameover-screen { background: rgba(43, 45, 66, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .result-box { background: var(--text); border-radius: 30px; padding: 30px; text-align: center; width: 85%; max-width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); margin-bottom: 30px; transform: scale(0.9); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .screen.active .result-box { transform: scale(1); }
  .result-box h2 { color: var(--dark); font-size: 28px; margin-bottom: 20px; }
  .result-row { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; border-bottom: 2px dashed #edf2f4; padding-bottom: 12px; }
  .result-row:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }
  .result-label { color: #8d99ae; font-size: 14px; font-weight: bold; }
  .result-val { color: var(--dark); font-size: 28px; font-weight: 900; }
  .result-val.new-record { color: #ef233c; animation: pulse 1s infinite; }
  
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  
  /* Energy Bar */
  #energy-container { position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); left: 50%; transform: translateX(-50%); width: 200px; height: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); overflow: hidden; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  #energy-container.active { opacity: 1; }
  #energy-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #00f5d4, #00bbf9); transform-origin: left; transition: transform 0.1s; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
  <div id="hud">
    <div class="score-box">
      <span class="score-label">HEIGHT</span>
      <span class="score-value" id="hud-score">0</span>
    </div>
    <div class="score-box right">
      <span class="score-label">BEST</span>
      <span class="score-value" id="hud-best">0</span>
    </div>
  </div>

  <div id="energy-container">
    <div id="energy-bar"></div>
  </div>

  <div id="title-screen" class="screen active">
    <h1>MOCHI<br>BOUNCE<span>もちバウンス</span></h1>
    <p class="subtitle">画面をなぞってトランポリンを描き<br>空高くジャンプさせよう！</p>
    <button class="btn" id="btn-start">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      PLAY
    </button>
  </div>

  <div id="gameover-screen" class="screen">
    <div class="result-box">
      <h2>GAME OVER</h2>
      <div class="result-row">
        <span class="result-label">SCORE</span>
        <span class="result-val" id="res-score">0</span>
      </div>
      <div class="result-row">
        <span class="result-label">BEST HEIGHT</span>
        <span class="result-val" id="res-best">0</span>
      </div>
    </div>
    <button class="btn" id="btn-retry">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      RETRY
    </button>
  </div>
</div>

<script>
"use strict";

/**
 * Audio System (Web Audio API - Procedural)
 */
const AudioSys = (() => {
  let ctx;
  let masterGain;
  let isMuted = false;
  let bgmGain = null;

  const init = () => {
    if (ctx) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    ctx = new AudioContext();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(ctx.destination);
  };

  const playTone = (freq, type, duration, vol, slideTo = null) => {
    if (!ctx || isMuted) return;
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo) {
      osc.frequency.exponentialRampToValueAtTime(slideTo, t + duration);
    }
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    
    osc.connect(gain).connect(masterGain);
    osc.start(t);
    osc.stop(t + duration);
  };

  const playBGM = () => {
    if (!ctx || isMuted) return;
    stopBGM();
    bgmGain = ctx.createGain();
    bgmGain.gain.value = 0.08;
    bgmGain.connect(masterGain);
    
    const notes = [261.63, 329.63, 392.00, 523.25];
    let step = 0;
    
    const playNext = () => {
      if (!bgmGain) return;
      const t = ctx.currentTime;
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = notes[step % notes.length];
      
      const env = ctx.createGain();
      env.gain.setValueAtTime(0.3, t);
      env.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
      
      osc.connect(env).connect(bgmGain);
      osc.start(t);
      osc.stop(t + 0.2);
      
      step++;
      setTimeout(playNext, 200); 
    };
    playNext();
  };

  const stopBGM = () => {
    if (bgmGain) {
      bgmGain.disconnect();
      bgmGain = null;
    }
  };

  return {
    init,
    playBounce: () => playTone(300, 'sine', 0.4, 0.8, 600),
    playDraw: () => playTone(800, 'triangle', 0.1, 0.2),
    playCoin: () => playTone(880, 'square', 0.3, 0.3, 1760),
    playHit: () => playTone(150, 'sawtooth', 0.5, 0.5, 50),
    playBGM,
    stopBGM,
    resume: () => { if(ctx && ctx.state === 'suspended') ctx.resume(); }
  };
})();

/**
 * Game Engine & Logic
 */
const Game = (() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d', { alpha: false });
  let W, H, DPR;
  
  // DOM Elements
  const screens = {
    title: document.getElementById('title-screen'),
    hud: document.getElementById('hud'),
    energy: document.getElementById('energy-container'),
    gameover: document.getElementById('gameover-screen')
  };
  const uiScore = document.getElementById('hud-score');
  const uiBest = document.getElementById('hud-best');
  const uiResScore = document.getElementById('res-score');
  const uiResBest = document.getElementById('res-best');
  const uiEnergyBar = document.getElementById('energy-bar');
  
  // Game State
  let state = 'TITLE';
  let lastTime = 0;
  let score = 0;
  let bestScore = parseInt(localStorage.getItem('mochiBest')) || 0;
  let cameraY = 0;
  let shakeTime = 0;
  
  uiBest.textContent = bestScore;
  
  // Input
  let ptr = { active: false, x: 0, y: 0, startX: 0, startY: 0, drawEnergy: 1.0 };
  const MAX_DRAW_DIST = 250;
  
  // Entities
  let player = null;
  let lines = [];
  let stars = [];
  let enemies = [];
  let particles = [];

  class Particle {
    constructor(x, y, color, speed, size) {
      this.x = x; this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const v = Math.random() * speed + speed*0.5;
      this.vx = Math.cos(angle) * v;
      this.vy = Math.sin(angle) * v;
      this.color = color;
      this.size = size;
      this.life = 1.0;
      this.decay = Math.random() * 0.02 + 0.02;
    }
    update(dt) {
      this.x += this.vx * dt * 60;
      this.y += this.vy * dt * 60;
      this.life -= this.decay * dt * 60;
    }
    draw(ctx) {
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1.0;
    }
  }

  class Player {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.vx = 0; this.vy = 0;
      this.radius = 20; // すり抜け防止のため少し大きめに設定
      this.color = '#ff99cc';
      this.gravity = 0.4;
      this.terminalVelocity = 18;
    }
    update(dt) {
      this.vy += this.gravity * (dt * 60);
      if (this.vy > this.terminalVelocity) this.vy = this.terminalVelocity;
      
      this.x += this.vx * dt * 60;
      this.y += this.vy * dt * 60;
      
      // Wall bounce
      if (this.x < this.radius) { this.x = this.radius; this.vx *= -0.8; }
      if (this.x > W - this.radius) { this.x = W - this.radius; this.vx *= -0.8; }
    }
    draw(ctx) {
      const speed = Math.hypot(this.vx, this.vy);
      const angle = Math.atan2(this.vy, this.vx);
      
      const stretch = 1 + Math.min(speed * 0.03, 0.6);
      const squash = 1 / stretch;

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(angle);
      ctx.scale(stretch, squash);
      
      // Body
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(0, 0, this.radius, 0, Math.PI*2);
      ctx.fill();
      
      // Glow
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.rotate(-angle); // 目を水平に保つ
      
      const lookX = (this.vx / 10) * 3;
      const lookY = Math.min((this.vy / 10) * 3, 5);
      
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-7, -5, 6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(7, -5, 6, 0, Math.PI*2); ctx.fill();
      
      // Pupils
      ctx.fillStyle = '#2b2d42';
      ctx.beginPath(); ctx.arc(-7 + lookX, -5 + lookY, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(7 + lookX, -5 + lookY, 3, 0, Math.PI*2); ctx.fill();
      
      // Blush
      ctx.fillStyle = 'rgba(255,0,100,0.3)';
      ctx.beginPath(); ctx.arc(-12, 3, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(12, 3, 4, 0, Math.PI*2); ctx.fill();

      ctx.restore();
    }
  }

  const resize = () => {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.scale(DPR, DPR);
  };

  const spawnParticles = (x, y, color, count, speed, size) => {
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(x, y, color, speed, size));
    }
  };

  const changeScreen = (newScreen) => {
    Object.values(screens).forEach(s => s.classList.remove('active'));
    if (newScreen === 'TITLE') screens.title.classList.add('active');
    if (newScreen === 'PLAYING') { screens.hud.classList.add('active'); screens.energy.classList.add('active'); }
    if (newScreen === 'GAMEOVER') { screens.gameover.classList.add('active'); screens.hud.classList.add('active'); }
  };

  const initGame = () => {
    player = new Player(W/2, H/2 - 100);
    player.vy = -6; 
    cameraY = 0;
    score = 0;
    lines = [];
    stars = [];
    enemies = [];
    particles = [];
    ptr.active = false;
    ptr.drawEnergy = 1.0;
    
    // 【改善点2】開始時の安全確保（暗黙のチュートリアルトランポリン）
    lines.push({
      x1: W/2 - 90, y1: H/2 + 80,
      x2: W/2 + 90, y2: H/2 + 80,
      life: 3.5,
      hitGlow: 0
    });

    for(let i=0; i<5; i++) {
      stars.push({ x: Math.random()*(W-40)+20, y: H/2 - i*150, radius: 10, collected: false });
    }
    
    uiScore.textContent = '0';
    state = 'PLAYING';
    changeScreen('PLAYING');
    AudioSys.init();
    AudioSys.resume();
    AudioSys.playBGM();
  };

  const triggerGameOver = () => {
    state = 'GAMEOVER';
    AudioSys.stopBGM();
    AudioSys.playHit();
    shakeTime = 0.5;
    
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('mochiBest', bestScore);
      uiResBest.classList.add('new-record');
      uiResBest.textContent = bestScore + " (NEW!)";
    } else {
      uiResBest.classList.remove('new-record');
      uiResBest.textContent = bestScore;
    }
    
    uiResScore.textContent = score;
    uiBest.textContent = bestScore;
    
    setTimeout(() => { changeScreen('GAMEOVER'); }, 800);
  };

  // --- Input Handling ---
  const getPointerPos = (e) => {
    const ev = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
  };

  const onDown = (e) => {
    if (state !== 'PLAYING') return;
    const p = getPointerPos(e);
    ptr.active = true;
    ptr.startX = p.x; ptr.startY = p.y + cameraY;
    ptr.x = p.x; ptr.y = p.y + cameraY;
    AudioSys.playDraw();
  };

  const onMove = (e) => {
    if (!ptr.active || state !== 'PLAYING') return;
    const p = getPointerPos(e);
    ptr.x = p.x; ptr.y = p.y + cameraY;
    
    const dx = ptr.x - ptr.startX;
    const dy = ptr.y - ptr.startY;
    const dist = Math.hypot(dx, dy);
    
    if (dist > MAX_DRAW_DIST * ptr.drawEnergy) {
      const angle = Math.atan2(dy, dx);
      ptr.x = ptr.startX + Math.cos(angle) * (MAX_DRAW_DIST * ptr.drawEnergy);
      ptr.y = ptr.startY + Math.sin(angle) * (MAX_DRAW_DIST * ptr.drawEnergy);
    }
  };

  const onUp = (e) => {
    if (!ptr.active || state !== 'PLAYING') return;
    ptr.active = false;
    
    const dx = ptr.x - ptr.startX;
    const dy = ptr.y - ptr.startY;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 20) {
      lines.push({
        x1: ptr.startX, y1: ptr.startY,
        x2: ptr.x, y2: ptr.y,
        life: 1.5,
        hitGlow: 0
      });
      if (lines.length > 3) lines.shift();
      
      ptr.drawEnergy = Math.max(0, ptr.drawEnergy - (dist / MAX_DRAW_DIST));
      spawnParticles(ptr.x, ptr.y - cameraY, '#00f5d4', 5, 2, 2);
    }
  };

  window.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchstart', onDown, {passive: false});
  window.addEventListener('touchmove', (e)=>{ e.preventDefault(); onMove(e); }, {passive: false});
  window.addEventListener('touchend', onUp);

  // --- World Generation ---
  const generateWorld = () => {
    const highestEntityY = Math.min(
      stars.length > 0 ? stars[stars.length-1].y : 0,
      enemies.length > 0 ? enemies[enemies.length-1].y : 0
    );
    
    if (highestEntityY > cameraY - H - 500) {
      const spawnY = highestEntityY - (Math.random() * 120 + 100);
      const isEnemy = Math.random() < Math.min(0.2 + (score / 4000), 0.6); 
      
      if (isEnemy && score > 200) {
        enemies.push({ x: Math.random()*(W-60)+30, y: spawnY, radius: 16, rot: 0 });
      } else {
        stars.push({ x: Math.random()*(W-40)+20, y: spawnY, radius: 12, collected: false });
      }
    }
    
    stars = stars.filter(s => s.y < cameraY + H + 100 && !s.collected);
    enemies = enemies.filter(e => e.y < cameraY + H + 100);
  };

  // --- Collision Math ---
  const lineCircleCollide = (line, circle) => {
    const ldx = line.x2 - line.x1;
    const ldy = line.y2 - line.y1;
    const lenSq = ldx*ldx + ldy*ldy;
    
    let t = ((circle.x - line.x1)*ldx + (circle.y - line.y1)*ldy) / lenSq;
    t = Math.max(0, Math.min(1, t)); 
    
    const closestX = line.x1 + t * ldx;
    const closestY = line.y1 + t * ldy;
    
    const dx = circle.x - closestX;
    const dy = circle.y - closestY;
    const distSq = dx*dx + dy*dy;
    
    if (distSq <= circle.radius * circle.radius) {
      const dist = Math.sqrt(distSq);
      if (dist === 0) return { hit: true, nx: 0, ny: -1, overlap: circle.radius, cx: closestX, cy: closestY };
      return { hit: true, nx: dx/dist, ny: dy/dist, overlap: circle.radius - dist, cx: closestX, cy: closestY };
    }
    return { hit: false };
  };

  // --- Main Loop ---
  const update = (dt) => {
    if (state !== 'PLAYING') {
      if (shakeTime > 0) shakeTime -= dt;
      return;
    }

    // 【改善点3】エネルギー回復速度を少し早めて遊びやすく調整
    if (!ptr.active) {
      ptr.drawEnergy = Math.min(1.0, ptr.drawEnergy + dt * 0.8);
    }
    uiEnergyBar.style.transform = `scaleX(${ptr.drawEnergy})`;

    if(player) player.update(dt);
    
    for (let i = lines.length - 1; i >= 0; i--) {
      let l = lines[i];
      l.life -= dt * 0.4; 
      if (l.life <= 0) {
        lines.splice(i, 1);
        continue;
      }
      
      if (!player) continue;

      const col = lineCircleCollide(l, player);
      
      if (col.hit) {
        // 【改善点1】すり抜け・トンネリング防止処理の抜本的見直し
        // 線が引かれた向きに関わらず、必ず「上向き」の法線を計算する
        const lineDx = l.x2 - l.x1;
        const lineDy = l.y2 - l.y1;
        const lineLen = Math.hypot(lineDx, lineDy);
        let normalX = -lineDy / lineLen;
        let normalY = lineDx / lineLen;
        
        // 常に上（Y軸マイナス方向）を向くように法線を反転
        if (normalY > 0) {
          normalX = -normalX;
          normalY = -normalY;
        }
        
        // プレイヤーが落下中（vy >= -2 は少しの猶予）であればバウンドを許可
        if (player.vy >= -2) {
          // 食い込みの解消
          player.x += normalX * col.overlap;
          player.y += normalY * col.overlap;
          
          // 固定のバウンド力 + 落下速度に応じた追加パワーで物理演算を安定させる
          const bounceForce = 13 + (Math.abs(player.vy) * 0.15);
          
          // 速度の反射適用
          player.vx = (player.vx * 0.5) + (normalX * 8);
          player.vy = -bounceForce * Math.abs(normalY); // 上向きのベクトルに乗算
          
          // 爆発防止の速度制限
          player.vx = Math.max(-16, Math.min(16, player.vx));
          player.vy = Math.max(-24, Math.min(24, player.vy));

          AudioSys.playBounce();
          spawnParticles(col.cx, col.cy - cameraY, '#ffffff', 10, 4, 3);
          l.hitGlow = 1.0;
        }
      }
    }

    if(player) {
      stars.forEach(s => {
        if(s.collected) return;
        const dx = player.x - s.x;
        const dy = player.y - s.y;
        if (dx*dx + dy*dy < (player.radius + s.radius)**2) {
          s.collected = true;
          ptr.drawEnergy = Math.min(1.0, ptr.drawEnergy + 0.3); 
          score += 10;
          uiScore.textContent = score;
          AudioSys.playCoin();
          spawnParticles(s.x, s.y - cameraY, '#ffd166', 12, 5, 4);
        }
      });

      enemies.forEach(e => {
        e.rot += dt * 2;
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        if (dx*dx + dy*dy < (player.radius + e.radius - 6)**2) {
          triggerGameOver();
          spawnParticles(player.x, player.y - cameraY, '#ef233c', 25, 8, 5);
        }
      });

      const targetCamY = player.y - H * 0.6; 
      if (targetCamY < cameraY) {
        cameraY += (targetCamY - cameraY) * (dt * 5);
      }
      
      const heightScore = Math.floor(Math.max(0, -player.y / 10));
      if (heightScore > score) {
        score = heightScore;
        uiScore.textContent = score;
      }

      if (player.y > cameraY + H + 50) {
        triggerGameOver();
      }
    }

    generateWorld();

    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update(dt);
      if (particles[i].life <= 0) particles.splice(i, 1);
    }
  };

  const draw = () => {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#111827');
    grad.addColorStop(1, '#374151');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    
    if (shakeTime > 0) {
      const mag = shakeTime * 20;
      ctx.translate((Math.random()-0.5)*mag, (Math.random()-0.5)*mag);
    }

    if (ptr.active) {
      const dx = ptr.x - ptr.startX;
      const dy = ptr.y - ptr.startY;
      const dist = Math.hypot(dx, dy);
      const maxD = MAX_DRAW_DIST * ptr.drawEnergy;
      
      ctx.strokeStyle = `rgba(0, 245, 212, 0.4)`;
      ctx.lineWidth = 4;
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(ptr.startX, ptr.startY - cameraY);
      
      let endX = ptr.x; let endY = ptr.y;
      if (dist > maxD) {
        const angle = Math.atan2(dy, dx);
        endX = ptr.startX + Math.cos(angle) * maxD;
        endY = ptr.startY + Math.sin(angle) * maxD;
        ctx.strokeStyle = `rgba(239, 35, 60, 0.6)`; 
      }
      ctx.lineTo(endX, endY - cameraY);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.translate(0, -cameraY);

    lines.forEach(l => {
      ctx.lineCap = 'round';
      
      ctx.strokeStyle = `rgba(0, 245, 212, ${Math.min(1.0, l.life)})`;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(l.x1, l.y1);
      ctx.lineTo(l.x2, l.y2);
      ctx.stroke();
      
      if (l.hitGlow > 0) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${l.hitGlow * l.life})`;
        ctx.lineWidth = 14;
        ctx.stroke();
        l.hitGlow -= 0.05;
      }
    });

    stars.forEach(s => {
      if(s.collected) return;
      ctx.fillStyle = '#ffd166';
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(performance.now() * 0.002);
      
      ctx.beginPath();
      for(let i=0; i<5; i++) {
        ctx.lineTo(Math.cos((18 + i*72)*Math.PI/180)*s.radius, -Math.sin((18 + i*72)*Math.PI/180)*s.radius);
        ctx.lineTo(Math.cos((54 + i*72)*Math.PI/180)*s.radius*0.4, -Math.sin((54 + i*72)*Math.PI/180)*s.radius*0.4);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    });

    enemies.forEach(e => {
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.rot);
      
      ctx.fillStyle = '#2b2d42';
      ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI*2); ctx.fill();
      
      ctx.fillStyle = '#ef233c';
      for(let i=0; i<8; i++) {
        const a = (i/8) * Math.PI*2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a-0.2)*e.radius*0.8, Math.sin(a-0.2)*e.radius*0.8);
        ctx.lineTo(Math.cos(a+0.2)*e.radius*0.8, Math.sin(a+0.2)*e.radius*0.8);
        ctx.lineTo(Math.cos(a)*e.radius*1.4, Math.sin(a)*e.radius*1.4);
        ctx.fill();
      }
      ctx.restore();
    });

    if (player && state === 'PLAYING') {
      player.draw(ctx);
    }

    ctx.restore(); 

    particles.forEach(p => p.draw(ctx));
  };

  const loop = (timestamp) => {
    let dt = (timestamp - lastTime) / 1000;
    if (dt > 0.1) dt = 0.016; 
    lastTime = timestamp;

    update(dt);
    draw();

    requestAnimationFrame(loop);
  };

  document.getElementById('btn-start').addEventListener('click', initGame);
  document.getElementById('btn-retry').addEventListener('click', initGame);

  return {
    start: () => {
      resize();
      window.addEventListener('resize', resize);
      requestAnimationFrame(loop);
    }
  };
})();

window.onload = Game.start;

</script>
</body>
</html>
