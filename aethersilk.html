<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#090a0f">
<meta name="description" content="AETHER SILK — リアルタイム布物理シミュレーションとインタラクティブ・オーディオ">
<title>AETHER SILK — 物理演算キャンバス</title>
<style>
  :root {
    --bg-top: #12141d;
    --bg-bot: #050608;
    --panel: rgba(18, 20, 31, 0.65);
    --panel-border: rgba(255, 255, 255, 0.12);
    --text: #f0f2ff;
    --dim: #8a92b2;
    --accent: #60a5fa;
    --accent-glow: rgba(96, 165, 250, 0.4);
    --red: #f472b6;
    --yellow: #fbbf24;
    --green: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #000; }
  body {
    position: fixed; inset: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--text);
    user-select: none; -webkit-user-select: none; touch-action: none;
    background: radial-gradient(circle at 50% 0%, var(--bg-top), var(--bg-bot) 80%);
  }
  
  #canvas {
    position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;
  }

  /* --- UI Layout --- */
  #ui {
    position: absolute; inset: 0; z-index: 10; pointer-events: none;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 16px);
  }

  header {
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .brand {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 16px; padding: 10px 14px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .brand h1 { font-size: 14px; font-weight: 800; letter-spacing: 0.15em; background: linear-gradient(90deg, #e0e7ff, #818cf8); -webkit-background-clip: text; color: transparent; }
  .brand p { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; color: var(--dim); margin-top: 2px; }

  .stats {
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 12px; padding: 8px 12px; text-align: right;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .stats-val { font-family: ui-monospace, monospace; font-size: 13px; font-weight: 700; color: var(--text); }
  .stats-lbl { font-size: 8.5px; letter-spacing: 0.1em; color: var(--dim); }

  /* --- Toolbar --- */
  #toolbar {
    pointer-events: auto; align-self: center;
    display: flex; gap: 8px; padding: 8px;
    background: var(--panel); border: 1px solid var(--panel-border);
    border-radius: 24px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }
  .tool-btn {
    width: 52px; height: 52px; border: none; border-radius: 18px;
    background: rgba(255,255,255,0.03); color: var(--dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.05em;
    transition: all 0.2s ease;
  }
  .tool-btn svg { width: 22px; height: 22px; fill: currentColor; }
  .tool-btn:active { transform: scale(0.92); }
  
  .tool-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent-glow); }
  .tool-btn.active[data-tool="tear"] { background: var(--red); box-shadow: 0 0 20px rgba(244,114,182,0.4); }
  .tool-btn.active[data-tool="pin"] { background: var(--yellow); box-shadow: 0 0 20px rgba(251,191,36,0.4); }

  /* --- Overlays --- */
  #start-screen {
    position: absolute; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(5, 6, 8, 0.75); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    padding: 24px; transition: opacity 0.5s ease;
  }
  .card {
    width: 100%; max-width: 360px;
    background: linear-gradient(145deg, rgba(30,34,50,0.8), rgba(15,17,25,0.9));
    border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
    padding: 32px 24px; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }
  .card h2 { font-size: 32px; font-weight: 300; letter-spacing: 0.15em; margin-bottom: 16px; text-shadow: 0 0 20px rgba(129,140,248,0.4); }
  .card p { font-size: 13px; line-height: 1.8; color: var(--dim); margin-bottom: 28px; letter-spacing: 0.05em; }
  .card p b { color: var(--text); }
  #start-btn {
    width: 100%; height: 56px; border: none; border-radius: 16px;
    background: linear-gradient(135deg, #818cf8, #3b82f6); color: #fff;
    font-size: 15px; font-weight: 800; letter-spacing: 0.2em;
    box-shadow: 0 8px 24px rgba(59,130,246,0.4);
  }
  #start-btn:active { transform: scale(0.96); }

  #toast {
    position: absolute; left: 50%; top: calc(env(safe-area-inset-top) + 80px);
    transform: translate(-50%, -10px); opacity: 0; pointer-events: none;
    background: rgba(15, 17, 26, 0.85); border: 1px solid var(--panel-border);
    padding: 10px 20px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--text);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }

  @media (max-height: 700px) {
    .tool-btn { width: 46px; height: 46px; border-radius: 14px; }
    .card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui" style="display:none;">
  <header>
    <div class="brand">
      <h1>AETHER SILK</h1>
      <p>SOFT BODY DYNAMICS</p>
    </div>
    <div class="stats">
      <div class="stats-val" id="integrity">100%</div>
      <div class="stats-lbl">INTEGRITY</div>
    </div>
  </header>

  <div id="toolbar">
    <button class="tool-btn active" data-tool="drag">
      <svg viewBox="0 0 24 24"><path d="M10 9h4V6h3l-5-5-5 5h3v3zm-1 1H6V7l-5 5 5 5v-3h3v-4zm14 2l-5-5v3h-3v4h3v3l5-5zm-9 3h-4v3H7l5 5 5-5h-3v-3z"/></svg>
      DRAG
    </button>
    <button class="tool-btn" data-tool="tear">
      <svg viewBox="0 0 24 24"><path d="M9.64 7.64c.23-.5.36-1.05.36-1.64 0-2.21-1.79-4-4-4S2 3.79 2 6s1.79 4 4 4c.59 0 1.14-.13 1.64-.36L10 12l-2.36 2.36C7.14 14.13 6.59 14 6 14c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4c0-.59-.13-1.14-.36-1.64L12 14l7 7h3v-1L9.64 7.64zm-3.64 1.36C4.9 9 4 8.1 4 7s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 10c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM12 12.5c-.28 0-.5-.22-.5-.5s.22-.5.5-.5.5.22.5.5-.22.5-.5.5zM19 3l-6 6 2 2 7-7V3h-3z"/></svg>
      TEAR
    </button>
    <button class="tool-btn" data-tool="pin">
      <svg viewBox="0 0 24 24"><path d="M16 9V4l1-1H7l1 1v5l-2 2v2h5v8l1 1 1-1v-8h5v-2l-2-2z"/></svg>
      PIN
    </button>
    <button class="tool-btn" data-tool="wind" id="btn-wind">
      <svg viewBox="0 0 24 24"><path d="M3 11h14c1.1 0 2-.9 2-2s-.9-2-2-2h-2V5c0-1.1-.9-2-2-2H9v2h4c.55 0 1 .45 1 1s-.45 1-1 1H3v4zm18-6h-2v2h2V5zm-4 10H3v2h14c1.65 0 3 1.35 3 3s-1.35 3-3 3h-2v-2h2c.55 0 1-.45 1-1s-.45-1-1-1H3v-2h14c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
      WIND
    </button>
    <button class="tool-btn" data-tool="reset" id="btn-reset">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      RESET
    </button>
  </div>
</div>

<div id="start-screen">
  <div class="card">
    <h2>AETHER SILK</h2>
    <p>指先で触れる、光の織物。<br>リアルタイム物理演算と<br>生成音響のシミュレーション。</p>
    <p style="text-align:left; font-size:11px; margin-top:16px;">
      <b>[DRAG]</b> 布を引っ張る<br>
      <b>[TEAR]</b> スワイプで糸を断ち切る<br>
      <b>[PIN]</b> タップで空間に固定 / 解除<br>
      ※端末の傾きで重力が変化します。
    </p>
    <button id="start-btn">触れる</button>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";

(() => {
  // --- Core Elements ---
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { alpha: false });
  const ui = document.getElementById("ui");
  const startScreen = document.getElementById("start-screen");
  
  // --- Config & State ---
  let W = 0, H = 0, DPR = 1;
  let points = [];
  let sticks = [];
  let totalSticks = 0;
  
  const config = {
    cols: 22,
    rows: 32,
    spacing: 0,
    friction: 0.99,
    gravity: { x: 0, y: 0.4 },
    iterations: 4,
    tearSensitivity: 2.2 // 伸び率による自動断裂
  };

  let state = {
    tool: 'drag', // drag, tear, pin
    windActive: false,
    windTime: 0,
    deviceGravity: { x: 0, y: 0 },
    pointers: new Map(), // id -> { x, y, px, py, active, targetPoint }
    lastCutPoint: null
  };

  // --- Audio Engine ---
  let audioCtx = null;
  let windGain = null;
  let masterGain = null;

  function initAudio() {
    if (audioCtx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.8;
      
      const comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -12;
      comp.ratio.value = 4;
      masterGain.connect(comp).connect(audioCtx.destination);

      // Procedural Wind Noise
      const bufferSize = audioCtx.sampleRate * 2;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
      
      const noiseSrc = audioCtx.createBufferSource();
      noiseSrc.buffer = noiseBuffer;
      noiseSrc.loop = true;
      
      const bandpass = audioCtx.createBiquadFilter();
      bandpass.type = "bandpass";
      bandpass.frequency.value = 400;
      bandpass.Q.value = 0.5;
      
      windGain = audioCtx.createGain();
      windGain.gain.value = 0.001; // nearly silent initially
      
      noiseSrc.connect(bandpass).connect(windGain).connect(masterGain);
      noiseSrc.start();
      
      // Update filter in loop
      state.windFilter = bandpass;
    } catch (e) {}
  }

  function playSnap() {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const t = audioCtx.currentTime;
    
    // Noise burst
    const osc = audioCtx.createOscillator();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
    
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    
    osc.connect(gain).connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.2);
  }

  function playChime(freq) {
    if (!audioCtx || audioCtx.state !== 'running') return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, t);
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain).connect(masterGain);
    osc.start(t);
    osc.stop(t + 0.5);
  }

  function vibrate(ms) {
    try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {}
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t.timer);
    t.timer = setTimeout(() => t.classList.remove("show"), 2000);
  }

  // --- Physics Classes ---
  class Point {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.px = x; this.py = y;
      this.pinned = false;
      this.baseX = x; this.baseY = y;
    }
  }

  class Stick {
    constructor(p1, p2, isShear = false) {
      this.p1 = p1; this.p2 = p2;
      this.length = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      this.active = true;
      this.isShear = isShear;
    }
  }

  // --- Initialization ---
  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.scale(DPR, DPR);
    
    // Recalculate spacing based on screen width
    config.spacing = Math.min(W * 0.9 / config.cols, H * 0.7 / config.rows);
    if (points.length === 0) createCloth();
  }
  window.addEventListener('resize', resize);

  function createCloth() {
    points = [];
    sticks = [];
    
    const startX = W / 2 - (config.cols * config.spacing) / 2;
    const startY = H * 0.15;

    // Create Points
    for (let y = 0; y < config.rows; y++) {
      for (let x = 0; x < config.cols; x++) {
        const p = new Point(startX + x * config.spacing, startY + y * config.spacing);
        // Pin the top row
        if (y === 0 && (x % 3 === 0 || x === config.cols - 1)) p.pinned = true;
        points.push(p);
      }
    }

    // Create Sticks
    for (let y = 0; y < config.rows; y++) {
      for (let x = 0; x < config.cols; x++) {
        const i = y * config.cols + x;
        // Horizontal
        if (x < config.cols - 1) sticks.push(new Stick(points[i], points[i + 1]));
        // Vertical
        if (y < config.rows - 1) sticks.push(new Stick(points[i], points[i + config.cols]));
        // Shear (Cross bracing for stability, invisible)
        if (x < config.cols - 1 && y < config.rows - 1) {
          sticks.push(new Stick(points[i], points[i + config.cols + 1], true));
          sticks.push(new Stick(points[i + 1], points[i + config.cols], true));
        }
      }
    }
    totalSticks = sticks.filter(s => !s.isShear).length;
    updateIntegrity();
  }

  // --- Physics Engine ---
  function update() {
    // Determine forces
    let gx = config.gravity.x + state.deviceGravity.x;
    let gy = config.gravity.y + state.deviceGravity.y;
    
    let wx = 0, wy = 0;
    if (state.windActive) {
      state.windTime += 0.05;
      wx = Math.sin(state.windTime) * 0.8 + Math.cos(state.windTime * 0.5) * 0.4;
      wy = Math.cos(state.windTime * 0.8) * 0.2;
      
      if (audioCtx && windGain) {
        const targetVol = 0.05 + Math.abs(wx) * 0.15;
        windGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.2);
        state.windFilter.frequency.setTargetAtTime(300 + Math.abs(wx)*800, audioCtx.currentTime, 0.2);
      }
    } else if (windGain) {
      windGain.gain.setTargetAtTime(0.001, audioCtx.currentTime, 0.5);
    }

    // Update Points (Verlet Integration)
    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      if (p.pinned) continue;
      
      const vx = (p.x - p.px) * config.friction;
      const vy = (p.y - p.py) * config.friction;
      
      p.px = p.x;
      p.py = p.y;
      
      // Add local wind variance
      const localWindX = wx > 0 ? wx * (1 + Math.sin(p.y * 0.05 + state.windTime)) : 0;
      
      p.x += vx + gx + localWindX;
      p.y += vy + gy;

      // Bounds
      if (p.x < 10) p.x = 10;
      if (p.x > W - 10) p.x = W - 10;
      if (p.y > H - 10) p.y = H - 10;
    }

    // Pointer Interaction Constraints
    state.pointers.forEach(ptr => {
      if (ptr.targetPoint && state.tool === 'drag') {
        ptr.targetPoint.x = ptr.x;
        ptr.targetPoint.y = ptr.y;
      }
    });

    // Relax Constraints
    for (let iter = 0; iter < config.iterations; iter++) {
      for (let i = 0; i < sticks.length; i++) {
        const s = sticks[i];
        if (!s.active) continue;

        const dx = s.p2.x - s.p1.x;
        const dy = s.p2.y - s.p1.y;
        const dist = Math.hypot(dx, dy);
        
        // Auto Tear
        if (dist > s.length * config.tearSensitivity) {
          s.active = false;
          if (!s.isShear) {
            playSnap();
            updateIntegrity();
          }
          continue;
        }

        const diff = s.length - dist;
        const percent = (diff / dist) / 2;
        const offsetX = dx * percent;
        const offsetY = dy * percent;

        if (!s.p1.pinned && (!ptrHolds(s.p1))) {
          s.p1.x -= offsetX;
          s.p1.y -= offsetY;
        }
        if (!s.p2.pinned && (!ptrHolds(s.p2))) {
          s.p2.x += offsetX;
          s.p2.y += offsetY;
        }
      }
    }
  }

  function ptrHolds(p) {
    if (state.tool !== 'drag') return false;
    for (const ptr of state.pointers.values()) {
      if (ptr.targetPoint === p) return true;
    }
    return false;
  }

  function updateIntegrity() {
    let activeSticks = 0;
    for (let s of sticks) {
      if (s.active && !s.isShear) activeSticks++;
    }
    const pct = Math.max(0, Math.round((activeSticks / totalSticks) * 100));
    document.getElementById("integrity").textContent = pct + "%";
  }

  // --- Rendering ---
  function render() {
    // Background gradient
    const bg = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, H);
    bg.addColorStop(0, "#12141d");
    bg.addColorStop(1, "#050608");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    ctx.lineCap = "round";

    // Draw Sticks
    for (let i = 0; i < sticks.length; i++) {
      const s = sticks[i];
      if (!s.active || s.isShear) continue;

      const dx = s.p2.x - s.p1.x;
      const dy = s.p2.y - s.p1.y;
      const dist = Math.hypot(dx, dy);
      const strain = Math.max(0, dist - s.length) / (s.length * (config.tearSensitivity - 1));
      
      // Iridescent coloring based on position and strain
      const hue = ((s.p1.x / W) * 60 + 200 + strain * 60) % 360;
      const light = 40 + strain * 40;
      const alpha = 0.5 + strain * 0.5;

      ctx.beginPath();
      ctx.moveTo(s.p1.x, s.p1.y);
      ctx.lineTo(s.p2.x, s.p2.y);
      ctx.strokeStyle = `hsla(${hue}, 80%, ${light}%, ${alpha})`;
      ctx.lineWidth = 1.5 + strain;
      ctx.stroke();
    }

    // Draw Pinned Points
    ctx.fillStyle = "rgba(251,191,36,0.8)";
    for (let i = 0; i < points.length; i++) {
      if (points[i].pinned) {
        ctx.beginPath();
        ctx.arc(points[i].x, points[i].y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Draw Pointer interactions
    state.pointers.forEach(ptr => {
      if (state.tool === 'tear' && ptr.active) {
        ctx.strokeStyle = "rgba(244,114,182,0.8)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(ptr.px, ptr.py);
        ctx.lineTo(ptr.x, ptr.y);
        ctx.stroke();
      }
    });
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  // --- Interaction Logic ---
  function getClosestPoint(x, y, radius = 40) {
    let closest = null;
    let minDist = radius;
    for (let p of points) {
      const d = Math.hypot(p.x - x, p.y - y);
      if (d < minDist) {
        minDist = d;
        closest = p;
      }
    }
    return closest;
  }

  // Line intersection for tearing
  function ccw(A, B, C) { return (C.y - A.y) * (B.x - A.x) > (B.y - A.y) * (C.x - A.x); }
  function intersect(A, B, C, D) {
    return ccw(A, C, D) !== ccw(B, C, D) && ccw(A, B, C) !== ccw(A, B, D);
  }

  function handlePointerDown(e) {
    if (e.target !== canvas) return;
    initAudio();
    if (audioCtx && audioCtx.state !== 'running') audioCtx.resume();
    
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const ptr = { x, y, px: x, py: y, active: true, targetPoint: null };
    state.pointers.set(e.pointerId, ptr);

    if (state.tool === 'drag') {
      ptr.targetPoint = getClosestPoint(x, y);
    } else if (state.tool === 'pin') {
      const p = getClosestPoint(x, y, 30);
      if (p) {
        p.pinned = !p.pinned;
        vibrate(10);
        playChime(p.pinned ? 600 : 400);
      }
    }
  }

  function handlePointerMove(e) {
    const ptr = state.pointers.get(e.pointerId);
    if (!ptr) return;

    const rect = canvas.getBoundingClientRect();
    ptr.px = ptr.x;
    ptr.py = ptr.y;
    ptr.x = e.clientX - rect.left;
    ptr.y = e.clientY - rect.top;

    if (state.tool === 'tear' && ptr.active) {
      // Check intersection with all active sticks
      let cutCount = 0;
      for (let s of sticks) {
        if (!s.active) continue;
        if (intersect(ptr, {x: ptr.px, y: ptr.py}, s.p1, s.p2)) {
          s.active = false;
          cutCount++;
        }
      }
      if (cutCount > 0) {
        playSnap();
        vibrate([10]);
        updateIntegrity();
      }
    }
  }

  function handlePointerUp(e) {
    state.pointers.delete(e.pointerId);
  }

  window.addEventListener('pointerdown', handlePointerDown);
  window.addEventListener('pointermove', handlePointerMove);
  window.addEventListener('pointerup', handlePointerUp);
  window.addEventListener('pointercancel', handlePointerUp);

  // --- UI Events ---
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      const action = btn.dataset.tool;
      
      if (action === 'reset') {
        createCloth();
        playChime(300);
        vibrate(20);
        showToast("再構築しました");
        return;
      }
      
      if (action === 'wind') {
        state.windActive = !state.windActive;
        btn.classList.toggle('active', state.windActive);
        showToast(state.windActive ? "風が発生しました" : "風が止みました");
        vibrate(15);
        return;
      }

      // Tool switching
      state.tool = action;
      document.querySelectorAll('.tool-btn:not([data-tool="reset"]):not([data-tool="wind"])').forEach(b => {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      
      const modes = { 'drag': 'ドラッグ', 'tear': '裁断', 'pin': 'ピン留め' };
      showToast(`${modes[action]}モード`);
      vibrate(10);
    });
  });

  // Device Orientation (Gravity)
  function handleOrientation(e) {
    if (!e.beta || !e.gamma) return;
    // beta: front/back tilt [-180,180], gamma: left/right tilt [-90,90]
    let x = e.gamma / 45; // limit influence
    let y = e.beta / 45;
    
    // clamp
    x = Math.max(-1.5, Math.min(1.5, x));
    y = Math.max(-0.5, Math.min(2.0, y));

    state.deviceGravity.x = x * 0.3;
    state.deviceGravity.y = y * 0.3;
  }

  // Start sequence
  document.getElementById('start-btn').addEventListener('click', async () => {
    initAudio();
    if (audioCtx.state !== 'running') await audioCtx.resume();
    
    // Request Device Orientation permission if needed (iOS 13+)
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm === 'granted') {
          window.addEventListener('deviceorientation', handleOrientation);
        }
      } catch(e) {}
    } else {
      window.addEventListener('deviceorientation', handleOrientation);
    }

    startScreen.style.opacity = '0';
    setTimeout(() => {
      startScreen.style.display = 'none';
      ui.style.display = 'flex';
    }, 500);
    
    playChime(800);
  });

  // --- Boot ---
  resize();
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
